l_simp_chinese:

CHI_zhenhai_fixed: "修缮镇海号水上飞机母舰"
CHI_zhenhai_fixed_desc: "1928年12月29日，张学良通电全国，宣布东北易帜，效忠南京国民政府，至此中国取得了统一。东北易帜后，原来的东北舰队部分舰队被编入了国民政府海军第三舰队，“镇海”号称为该舰队头号主力战舰。"
KMT_zhenhai.1.t: "镇海号修复工作已完成"
KMT_zhenhai.1.d: "修复后的修缮镇海号水上飞机母舰已抵达港口，其武备指标如下：\n\n                     排水量：2708吨\n                     最大航速：10.8节\n                     119.4mm主炮：2门\n                     75mm副炮：4门\n                     搭载舰载机：施来克FBA-19型水上飞机"
KMT_zhenhai.1.a: "太好了"

CHI_6000t_builed: "订购6000吨级重巡洋舰"
CHI_6000t_builed_desc: "三菱造船所应中华民国海军要求设计了6000吨级别的重巡洋舰，然而在民国海军同三菱进行有关6000吨巡洋舰的建造商议之时，承造巡洋舰宁海号的播磨造船所也决定竞争这艘6000吨军舰的建造权，于是两家分别提供了不同的重巡洋舰设计方案。"
KMT_ca6000t.1.t: "我们收到了三菱和播磨的方案和报价"
KMT_ca6000t.1.d: "随着海军部‘六年造舰计划’的推进，民国海军部与日本三菱播磨造船所、播磨造船所的谈判已进入实质阶段。\n三菱方案在武备和装甲方面做了相应的取舍，而播磨方面设计偏保守但造价稍贵。\n现在，面对日益紧张的海军军费和中日关系，我们必须尽快做出抉择。"
KMT_ca6000t.1.a: "阅览三菱造船所设计方案"
KMT_ca6000t.1.b: "阅览播磨造船所设计方案"

KMT_ca6000t.2.t: "三菱造船所提交方案"
KMT_ca6000t.2.d: "                     三菱造船所设计方案(4号终案)：\n\n                     排水量：6150吨\n                     最大航速：27.5节\n                     主炮武器：3座双联装200mm/50倍径舰炮\n                     副炮武器：2门双联装140mm/45倍径舰炮\n                     防空武器：3门76mm/40倍径高射炮、2座40mm双联装机炮\n                     鱼雷武器：2座三联装533mm鱼雷发射管\n                     反潜武器：2座深弹投射机、1套深弹投放架\n                     航空能力：搭载2架水上侦察机\n\n                     报价评估：偏低\n                     交付周期：280天"
KMT_ca6000t.2.a: "我们选择三菱方案"
KMT_ca6000t.2.b: "返回首页"
CHI_select_sanling: "联系三菱造船所开工建造"

KMT_ca6000t.3.t: "播磨造船所提交方案"
KMT_ca6000t.3.d: "                     播磨造船所设计方案(2号终案)：\n\n                     排水量：6000吨\n                     最大航速：28节\n                     主炮武器：3座双联装200mm/50倍径舰炮\n                     副炮武器：2座双联装120mm/45倍径舰炮\n                     防空武器：6门76mm/40倍径高射炮、4挺7.7mm重机枪\n                     鱼雷武器：2座三联装533mm发射管\n                     反潜武器：2座深弹投射机\n                     航空能力：搭载2架水上侦察机\n\n                     报价评估：偏高\n                     交付周期：320天"
KMT_ca6000t.3.a: "我们选择播磨方案"
KMT_ca6000t.3.b: "返回首页"
CHI_select_bomo: "联系播磨造船所开工建造"

KMT_ca6000t.4.t: "三菱造船所合同已完成交付"
KMT_ca6000t.4.d: "              三菱造船所交付的6000吨级重巡洋舰已抵达港口，其武备清单如下：\n\n                     排水量：6150吨\n                     最大航速：27.5节\n                     主炮武器：3座双联装200mm/50倍径舰炮\n                     副炮武器：2门双联装140mm/45倍径舰炮\n                     防空武器：3门76mm/40倍径高射炮、2座40mm双联装机炮\n                     鱼雷武器：2座三联装533mm鱼雷发射管\n                     反潜武器：2座深弹投射机、1套深弹投放架\n                     航空能力：搭载2架水上侦察机"
KMT_ca6000t.4.a: "太好了"

KMT_ca6000t.5.t: "播磨造船所合同已完成交付"
KMT_ca6000t.5.d: "              播磨造船所交付的6000吨级重巡洋舰已抵达港口，其武备清单如下：\n\n                     排水量：6000吨\n                     最大航速：28节\n                     主炮武器：3座双联装200mm/50倍径舰炮\n                     副炮武器：2座双联装120mm/45倍径舰炮\n                     防空武器：6门76mm/40倍径高射炮、4挺7.7mm重机枪\n                     鱼雷武器：2座三联装533mm发射管\n                     反潜武器：2座深弹投射机\n                     航空能力：搭载2架水上侦察机"
KMT_ca6000t.5.a: "太好了"

CHI_largeShipyard_construction: "民国海军建设计划"
CHI_largeShipyard_construction_desc: "我们的海军司令陈绍宽曾多次提出要重点发展海军力量，特别强调要建造航母和大型战舰，是时候开始这项雄心勃勃的造舰计划了！"

CHI_largeShipyard_construction_01: "执行民国十七年整顿海军办法"
CHI_largeShipyard_construction_01_desc: "北京政府海军总司令杨树庄在1928年曾草拟过一份“整顿海军办法”，即新增3艘巡洋舰、10艘内河炮舰、4艘驱逐舰、2艘潜艇。1艘水机母舰和2艘布雷舰，其中巡洋舰和潜艇向国外采购，内河炮舰则由技术设备及人员较全、运营状况良好的上海江南造船所承建。"

CHI_largeShipyard_construction_02: "重启1930年海军建设方案"
CHI_largeShipyard_construction_02_desc: "国民政府海军部曾于1930年提出过一份规模庞大的造舰计划，该计划希望建造：1艘航空母舰、2艘重巡洋舰、2艘轻巡洋舰及100余艘辅助作战舰艇（驱逐舰、炮舰、炮艇、鱼雷艇等）。\n这个方案之前根本无法实施，现在军队收复了大连港湾，我们可以建造更大、更先进的战舰，甚至是航空母舰。"

CHI_largeShipyard_construction_03: "建立中华民国太平洋舰队"
CHI_largeShipyard_construction_03_desc: "我们已经建成了第一支现代化的海军舰队，而现在则需要建立一支能够在太平洋上能与英国甚至美国匹敌的远洋舰队，来保护我们的海上利益。以台湾作为支点，我们将突破第一岛链的封锁，让全世界感受来自中国的威严。"